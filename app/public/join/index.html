<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Sora:wght@300;400;500&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<style>
  :root {
    --bg: #0a0a0a;
    --bg-elev: #121212;
    --text: #e8e8e8;
    --text-dim: #8a8a8a;
    --text-muted: #5a5a5a;
    --border: #1f1f1f;
    --accent: #54db98;
    --accent-dim: #28d27d;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body { height: 100%; overflow: hidden; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Sora', 'Pretendard Variable', -apple-system, BlinkMacSystemFont, sans-serif;
    font-weight: 300;
    letter-spacing: -0.005em;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    display: flex;
    flex-direction: column;
  }

  ::selection { background: var(--accent); color: #000; }

  header {
    height: 64px;
    flex-shrink: 0;
    background: rgba(10, 10, 10, 0.92);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 32px;
    position: relative;
    z-index: 2;
  }

  .home-link {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    text-decoration: none;
    color: var(--text);
    transition: opacity 160ms ease;
  }

  .home-link:hover { opacity: 0.7; }
  .home-link svg { display: block; }

  .home-link .brand-text {
    font-family: 'Space Mono', 'Pretendard Variable', monospace;
    font-size: 12px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text);
    font-weight: 700;
  }

  .primary-nav {
    display: flex;
    align-items: center;
    gap: 28px;
  }

  .nav-link {
    font-family: 'Space Mono', 'Pretendard Variable', monospace;
    font-size: 12px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-dim);
    text-decoration: none;
    transition: color 160ms ease;
    position: relative;
    padding: 4px 0;
  }

  .nav-link:hover { color: var(--accent); }

  .nav-link[aria-current="page"] { color: var(--text); }

  .nav-link[aria-current="page"]::after {
    content: '';
    position: absolute;
    left: 0;
    right: 0;
    bottom: -2px;
    height: 1px;
    background: var(--accent);
  }

  .stage {
    flex: 1;
    padding: 36px clamp(24px, 4vw, 80px) 28px;
    display: flex;
    flex-direction: column;
    align-items: center;
    background:
      radial-gradient(ellipse 70% 50% at 50% 0%, rgba(84, 219, 152, 0.05) 0%, transparent 60%),
      radial-gradient(ellipse 90% 70% at 50% 30%, #161616 0%, #0a0a0a 65%);
    min-height: 0;
    overflow: hidden;
    position: relative;
  }

  .stage-label {
    font-family: 'Space Mono', 'Pretendard Variable', monospace;
    font-size: 10px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 18px;
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .stage-label::before,
  .stage-label::after {
    content: '';
    width: 28px;
    height: 1px;
    background: var(--border);
  }

  .card {
    position: relative;
    width: 100%;
    max-width: 1140px;
    flex: 1;
    background: #ffffff;
    border-radius: 6px;
    overflow: hidden;
    min-height: 0;
    box-shadow:
      0 0 0 1px rgba(84, 219, 152, 0.14),
      inset 0 1px 0 rgba(255, 255, 255, 1),
      0 2px 4px rgba(0, 0, 0, 0.4),
      0 24px 48px -12px rgba(0, 0, 0, 0.55),
      0 48px 96px -24px rgba(0, 0, 0, 0.45);
  }

  iframe {
    width: 100%;
    height: 100%;
    border: 0;
    background: #ffffff;
    display: block;
  }

  .loader {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 28px;
    background: #ffffff;
    z-index: 5;
    opacity: 1;
    transition: opacity 360ms ease;
  }

  .loader.hidden { opacity: 0; pointer-events: none; }

  .loader-mark {
    width: 56px;
    height: 56px;
    animation: mark-breathe 2.8s ease-in-out infinite;
    will-change: transform;
  }

  .loader-mark > * {
    transform-origin: center;
    animation: stroke-pulse 1.6s ease-in-out infinite;
    will-change: opacity;
  }

  .loader-mark circle { animation-delay: 0s; }
  .loader-mark path:nth-of-type(1) { animation-delay: 0.12s; }
  .loader-mark path:nth-of-type(2) { animation-delay: 0.24s; }
  .loader-mark line { animation-delay: 0.36s; }

  @keyframes mark-breathe {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.05); }
  }

  @keyframes stroke-pulse {
    0%, 100% { opacity: 0.22; }
    50% { opacity: 1; }
  }

  .loader-label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: #6a6a6a;
  }

  .dots { display: inline-block; margin-left: 2px; }

  .dots span {
    display: inline-block;
    animation: dot-fade 1.4s ease-in-out infinite;
    opacity: 0.25;
  }

  .dots span:nth-child(1) { animation-delay: 0s; }
  .dots span:nth-child(2) { animation-delay: 0.18s; }
  .dots span:nth-child(3) { animation-delay: 0.36s; }

  @keyframes dot-fade {
    0%, 70%, 100% { opacity: 0.25; }
    35% { opacity: 1; }
  }

  @media (max-width: 720px) {
    header { padding: 0 20px; }
    .primary-nav { gap: 20px; }
    .stage { padding: 18px 10px 10px; }
    .stage-label { margin-bottom: 12px; font-size: 9px; }
    .stage-label::before, .stage-label::after { width: 18px; }
    .card { border-radius: 4px; }
    .loader-mark { width: 48px; height: 48px; }
  }

  @media (max-width: 360px) {
    .home-link .brand-text { display: none; }
  }
</style>
</head>
<body>

<header>
  <a class="home-link" href="/" aria-label="Project Canopy home">
    <svg width="28" height="28" viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <circle cx="26" cy="26" r="25" stroke="#54db98" stroke-width="1"/>
      <path d="M8 34 Q26 8 44 34" stroke="#54db98" stroke-width="1" stroke-linecap="round" fill="none"/>
      <path d="M12 34 Q26 16 40 34" stroke="#54db98" stroke-width="1" stroke-linecap="round" fill="none" opacity="0.6"/>
      <line x1="8" y1="34" x2="44" y2="34" stroke="#54db98" stroke-width="1"/>
    </svg>
    <span class="brand-text">Project Canopy</span>
  </a>
  <nav class="primary-nav" aria-label="Primary">
    <a class="nav-link" href="/faq/">FAQ</a>
    <a class="nav-link" href="/join/" aria-current="page">Join</a>
  </nav>
</header>

<div class="stage">
  <div class="stage-label">Participation Form</div>
  <div class="card">
    <div class="loader" data-loader role="status" aria-label="Loading form">
      <svg class="loader-mark" viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <circle cx="26" cy="26" r="25" stroke="#28d27d" stroke-width="1"/>
        <path d="M8 34 Q26 8 44 34" stroke="#28d27d" stroke-width="1" stroke-linecap="round" fill="none"/>
        <path d="M12 34 Q26 16 40 34" stroke="#28d27d" stroke-width="1" stroke-linecap="round" fill="none"/>
        <line x1="8" y1="34" x2="44" y2="34" stroke="#28d27d" stroke-width="1"/>
      </svg>
      <div class="loader-label">Loading<span class="dots"><span>.</span><span>.</span><span>.</span></span></div>
    </div>
    <iframe
      src="https://docs.google.com/forms/d/e/1FAIpQLSeO7Ypqiawf5NGQD1uOqIhcoXFF_NnwHeLnmhs5vt5AI8PVKg/viewform?embedded=true"
      title="Project Canopy — Interest Form"
      loading="lazy"
      referrerpolicy="no-referrer-when-downgrade">
    </iframe>
  </div>
</div>

<script>
  (function () {
    const iframe = document.querySelector('iframe');
    const loader = document.querySelector('[data-loader]');
    if (!iframe || !loader) return;
    let removed = false;
    function hide() {
      if (removed) return;
      removed = true;
      loader.classList.add('hidden');
      setTimeout(() => loader.remove(), 500);
    }
    iframe.addEventListener('load', hide);
    setTimeout(hide, 15000);
  })();
</script>

</body>
</html>

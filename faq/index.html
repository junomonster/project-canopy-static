<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="description" content="Project Canopy 자주 묻는 질문 — AI 시대의 소프트웨어 보안.">

<meta property="og:type" content="website">

<meta property="og:description" content="Project Canopy 자주 묻는 질문 — AI 시대의 소프트웨어 보안.">
<meta property="og:image" content="https://option-a.project-canopy.com/og.png">
<meta property="og:image:width" content="1200">

<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Project Canopy · FAQ">
<meta name="twitter:description" content="Project Canopy 자주 묻는 질문.">
<meta name="twitter:image" content="https://option-a.project-canopy.com/og.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Instrument+Serif:ital@0;1&family=Sora:wght@300;500&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<style>
  :root {
    --bg: #0a0a0a;
    --bg-elev: #121212;
    --text: #e8e8e8;
    --text-dim: #8a8a8a;
    --text-muted: #5a5a5a;
    --border: #1f1f1f;
    --accent: #54db98;
    --accent-dim: #28d27d;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body { min-height: 100%; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Sora', 'Pretendard Variable', -apple-system, BlinkMacSystemFont, sans-serif;
    font-weight: 300;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    letter-spacing: -0.005em;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  ::selection { background: var(--accent); color: #000; }

  header {
    height: 64px;
    flex-shrink: 0;
    background: rgba(10, 10, 10, 0.92);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 32px;
    position: sticky;
    top: 0;
    z-index: 2;
  }

  .home-link {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    text-decoration: none;
    color: var(--text);
    transition: opacity 160ms ease;
  }

  .home-link:hover { opacity: 0.7; }
  .home-link svg { display: block; }

  .home-link .brand-text {
    font-family: 'Space Mono', 'Pretendard Variable', monospace;
    font-size: 12px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text);
    font-weight: 700;
  }

  .meta {
    font-family: 'Space Mono', 'Pretendard Variable', monospace;
    font-size: 12px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  .page {
    flex: 1;
    width: 100%;
    max-width: 720px;
    margin: 0 auto;
    padding: 80px 32px 64px;
  }

  .page-label {
    font-family: 'Space Mono', 'Pretendard Variable', monospace;
    font-size: 10px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .page-label::before {
    content: '';
    width: 28px;
    height: 1px;
    background: var(--border);
  }

  h1 {
    font-family: 'Instrument Serif', 'Gowun Batang', serif;
    font-weight: 400;
    font-size: clamp(28px, 4vw, 48px);
    line-height: 1.15;
    letter-spacing: -0.015em;
    margin-bottom: 8px;
  }

  h1 em {
    font-style: italic;
    color: var(--text-dim);
  }

  .page-subtitle {
    font-family: 'Pretendard Variable', 'Sora', sans-serif;
    font-weight: 300;
    font-size: 15px;
    line-height: 1.6;
    color: var(--text-dim);
    margin-bottom: 56px;
  }

  .faq-list {
    list-style: none;
    border-top: 1px solid var(--border);
  }

  .faq-item {
    padding: 28px 0;
    border-bottom: 1px solid var(--border);
  }

  .faq-item h3 {
    font-family: 'Sora', 'Pretendard Variable', -apple-system, sans-serif;
    font-weight: 500;
    font-size: 17px;
    line-height: 1.55;
    color: var(--text);
    margin-bottom: 14px;
    letter-spacing: -0.005em;
  }

  .faq-item p {
    font-family: 'Sora', 'Pretendard Variable', -apple-system, sans-serif;
    font-weight: 300;
    font-size: 15px;
    line-height: 1.75;
    color: var(--text-dim);
    white-space: pre-line;
    letter-spacing: -0.003em;
  }

  .faq-empty {
    padding: 32px 0;
    font-family: 'Sora', 'Pretendard Variable', sans-serif;
    font-size: 14px;
    color: var(--text-muted);
    text-align: center;
    list-style: none;
  }

  .page-footer {
    border-top: 1px solid var(--border);
    padding: 36px 32px 48px;
    display: flex;
    justify-content: center;
  }

  .footer-link {
    font-family: 'Space Mono', 'Pretendard Variable', monospace;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-muted);
    text-decoration: none;
    transition: color 160ms ease;
  }

  .footer-link:hover { color: var(--accent); }

  @media (max-width: 480px) {
    header { padding: 0 20px; }
    .meta { display: none; }
    .page { padding: 48px 24px 40px; }
    .page-subtitle { margin-bottom: 40px; font-size: 14px; }
    .faq-item { padding: 24px 0; }
    .faq-item h3 { font-size: 16px; }
    .faq-item p { font-size: 14px; }
    .page-footer { padding: 28px 24px 36px; }
  }
</style>
</head>
<body>

<header>
  <a class="home-link" href="../" aria-label="Back to Project Canopy">
    <svg width="28" height="28" viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <circle cx="26" cy="26" r="25" stroke="#54db98" stroke-width="1"/>
      <path d="M8 34 Q26 8 44 34" stroke="#54db98" stroke-width="1" stroke-linecap="round" fill="none"/>
      <path d="M12 34 Q26 16 40 34" stroke="#54db98" stroke-width="1" stroke-linecap="round" fill="none" opacity="0.6"/>
      <line x1="8" y1="34" x2="44" y2="34" stroke="#54db98" stroke-width="1"/>
    </svg>
    <span class="brand-text">Project Canopy</span>
  </a>
  <span class="meta">Project Canopy · FAQ</span>
</header>

<main class="page">
  <div class="page-label">Frequently Asked Questions</div>
  <h1>Questions <em>and answers.</em></h1>
  <div class="page-subtitle">자주 묻는 질문</div>
  <ul class="faq-list" data-faq-list>
    <li class="faq-empty">Loading…</li>
  </ul>
</main>

<footer class="page-footer">
  <a class="footer-link" href="../join/">Express Interest →</a>
</footer>

<script>
  (function () {
    const list = document.querySelector('[data-faq-list]');
    if (!list) return;

    fetch('faq.json', { cache: 'no-store' })
      .then(function (res) {
        if (!res.ok) throw new Error('HTTP ' + res.status);
        return res.json();
      })
      .then(function (data) {
        const items = (data && Array.isArray(data.items)) ? data.items : [];
        if (items.length === 0) {
          list.innerHTML = '<li class="faq-empty">No questions yet.</li>';
          return;
        }
        const frag = document.createDocumentFragment();
        items.forEach(function (item) {
          const li = document.createElement('li');
          li.className = 'faq-item';
          const h3 = document.createElement('h3');
          h3.textContent = item.question || '';
          const p = document.createElement('p');
          p.textContent = item.answer || '';
          li.appendChild(h3);
          li.appendChild(p);
          frag.appendChild(li);
        });
        list.innerHTML = '';
        list.appendChild(frag);
      })
      .catch(function () {
        list.innerHTML = '<li class="faq-empty">Unable to load FAQ. Try refreshing.</li>';
      });
  })();
</script>

</body>
</html>
